name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Genera SOLO la tarjeta de Lenguajes
      - uses: lowlighter/metrics@latest
        with:
          filename: languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: "" # Esto apaga todo lo demás (commits, estrellas, etc.)
          
          # Configuración de lenguajes
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          
          # AQUÍ CAMBIAMOS EL TÍTULO
          # Usamos un alias para renombrar la sección
          plugin_languages_title: My Programming Languages
